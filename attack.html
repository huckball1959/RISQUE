<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Attack Phase</title>
  <link rel="stylesheet" href="game.css">
  <script src="core.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
    }
    .attack-button {
      cursor: pointer;
      pointer-events: all;
    }
    .attack-button:hover:not(:disabled) {
      opacity: 0.8;
    }
    .attack-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .dice {
      pointer-events: none;
    }
    .dice-rolling {
      animation: rollDice 0.5s linear;
    }
    @keyframes rollDice {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(1080deg);
      }
    }
    .dice-text-hidden {
      opacity: 0;
    }
    .dice-text-visible {
      opacity: 1;
      transition: opacity 0.2s ease-in;
    }
    #attacker-dice-0 {
      transform-origin: 1524.1607px 556.1393px;
    }
    #attacker-dice-1 {
      transform-origin: 1608.8265px 556.1393px;
    }
    #attacker-dice-2 {
      transform-origin: 1696.2828px 556.1393px;
    }
    #defender-dice-0 {
      transform-origin: 1524.6899px 666.2913px;
    }
    #defender-dice-1 {
      transform-origin: 1609.3555px 666.2913px;
    }
    .ui-overlay {
      pointer-events: none;
    }
    .ui-overlay * {
      pointer-events: auto;
    }
    #ui-svg {
      pointer-events: none;
    }
    .prompt {
      position: absolute;
      top: 306.9133px;
      left: 1170px;
      width: 660px;
      background: #00ffff;
      border: 2px solid #000000;
      padding: 10px;
      text-align: center;
    }
    .prompt-text {
      font-family: Arial;
      font-size: 18px;
      color: #000000;
    }
    .prompt-button {
      margin: 5px;
      padding: 5px 10px;
      font-family: Arial;
      font-size: 16px;
    }
    .prompt-select, .prompt-input {
      font-family: Arial;
      font-size: 16px;
      margin: 5px;
    }
    .active-attacker {
      fill: #ff5555;
    }
    .active-defender {
      fill: #aaaaaa;
    }
    .attack-player-name {
      font-family: Arial, sans-serif;
      font-size: 20px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-shadow: 2px 2px 2px rgba(0, 0, 0, 0.7);
      position: absolute;
      left: 1110px;
      top: 250px;
      z-index: 10;
      pointer-events: none;
    }
    .aerial-bridge {
      stroke: #ff0000;
      stroke-width: 4;
      stroke-dasharray: 5,5;
    }
    .button-text {
      pointer-events: none;
    }
    .error {
      position: absolute;
      top: 10px;
      left: 10px;
      color: red;
      font-family: Arial;
      font-size: 16px;
      z-index: 1000;
      display: none;
    }
  </style>
</head>
<body>

      <div class="attack-player-name" id="attack-player-name"></div>
      <svg id="ui-svg" width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">

          <rect id="roll" class="attack-button" x="1116.5294" y="505.18381" width="295.61032" height="47.954094" fill="#00ffff" stroke="#000000" stroke-width="0.729165"/>

          <rect id="blitz" class="attack-button" x="1116.6119" y="553.13788" width="295.44534" height="47.624477" fill="#ffff00" stroke="#000000" stroke-width="0.726452"/>

          <rect id="stop-attack" class="attack-button" x="1116.6119" y="696.01123" width="295.44534" height="47.624477" fill="pink" stroke="#000000" stroke-width="0.726452"/>

          <text class="button-text" x="1264" y="767.46" font-family="Arial" font-size="20" fill="#000" text-anchor="middle" dominant-baseline="middle">New Attack</text>

          <text id="attacker-dice-text-1" x="1608.8265" y="556.1393" class="dice" font-family="Arial" font-size="24" font-weight="bold" fill="#000" text-anchor="middle" dominant-baseline="middle"></text>
          <rect id="attacker-dice-2" class="dice" x="1665.6786" y="523.27026" width="61.209011" height="61.738586" fill="#ff0000" stroke="#000000" stroke-width="1.05833"/>
          <text id="attacker-dice-text-2" x="1696.2828" y="556.1393" class="dice" font-family="Arial" font-size="24" font-weight="bold" fill="#000" text-anchor="middle" dominant-baseline="middle"></text>
          <text x="1524.6899" y="620" font-family="Arial" font-size="18" font-weight="bold" fill="#24221c" text-anchor="middle" class="button-text">DEFENDER'S DICE</text>
          <rect id="defender-dice-0" class="dice" x="1494.0857" y="633.4223" width="61.209011" height="61.738586" fill="#cccccc" stroke="#000000" stroke-width="1.05833"/>
          <text id="defender-dice-text-0" x="1524.6899" y="666.2913" class="dice" font-family="Arial" font-size="24" font-weight="bold" fill="#000" text-anchor="middle" dominant-baseline="middle"></text>
          <rect id="defender-dice-1" class="dice" x="1578.7513" y="633.4223" width="61.209011" height="61.738586" fill="#cccccc" stroke="#000000" stroke-width="1.05833"/>
          <text id="defender-dice-text-1" x="1609.3555" y="666.2913" class="dice" font-family="Arial" font-size="24" font-weight="bold" fill="#000" text-anchor="middle" dominant-baseline="middle"></text>
          <rect id="log" x="1125" y="851.4198" width="750" height="185.2063" fill="#86c1fd" stroke="#000000" stroke-width="1"/>

          <g id="aerial-bridge-group"></g>
        </g>
      </svg>
    </div>
    <div id="error" class="error"></div>
  </div>
  <script type="text/javascript">
    var gk_isXlsx = false;
    var gk_xlsxFileLookup = {};
    var gk_fileData = {};
    function filledCell(cell) {
      return cell !== '' && cell != null;
    }
    function loadFileData(filename) {
      if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
        try {
          var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
          var firstSheetName = workbook.SheetNames[0];
          var worksheet = workbook.Sheets[firstSheetName];
          var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
          var filteredData = jsonData.filter(row => row.some(filledCell));
          var headerRowIndex = filteredData.findIndex((row, index) =>
            row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
          );
          if (headerRowIndex === -1 || headerRowIndex > 25) {
            headerRowIndex = 0;
          }
          var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex));
          csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
          return csv;
        } catch (e) {
          console.error(e);
          return "";
        }
      }
      return gk_fileData[filename] || "";
    }
    console.log('[Attack] Loaded at', new Date().toLocaleString());
    let attacker = null;
    let defender = null;
    let isPausibleBlitzActive = false;
    let isPausibleBlitzPaused = false;
    let pausableBlitzInterval = null;
    let isAcquiring = false;
    let troopsToTransfer = 0;
    let minTroopsToTransfer = 0;
    let maxTroopsToTransfer = 0;
    let acquiredTerritory = null;
    let hasAttacked = false;
    let attackerDice = 0;
    let isAerialAttackEnabled = false;
    let aerialBridge = null;
    let isSelectingAerialSource = false;
    let isSelectingAerialTarget = false;
    let attackerInitialTroops = 0;
    let transferCompleted = false;
    function logToStorage(message, data) {
      const timestamp = new Date().toLocaleString("en-US", { timeZone: "America/New_York" });
      const logEntry = `[${timestamp}] [Attack] ${message}`;
      const logs = JSON.parse(localStorage.getItem("gameLogs") || "[]");
      logs.push(logEntry);
      if (data) logs.push(JSON.stringify(data, null, 2));
      localStorage.setItem("gameLogs", JSON.stringify(logs));
      console.log(logEntry, data || '');
      const logText = document.getElementById('log-text');
      if (logText) {
        logText.textContent = logEntry + '\n' + logText.textContent.slice(0, 1000);
      }
    }
    function saveGameState() {
      try {
        localStorage.setItem('gameState', JSON.stringify(window.gameState));
        logToStorage('Game state saved');
      } catch (e) {
        logToStorage('Failed to save game state: ' + e.message);
      }
    }
    function updatePlayerTroopsTotal(player) {
      const total = player.territories.reduce((sum, t) => {
        const troops = t.troops || 0;
        if (troops < 0) {
          logToStorage(`Negative troops detected for ${player.name} in ${t.name}: ${troops}, correcting to 0`, {
            territory: t.name,
            troops: troops
          });
          t.troops = 0;
          return sum;
        }
        return sum + troops;
      }, 0);
      if (total < 0) {
        logToStorage(`_Abort_ Negative troop total detected for ${player.name}: ${total}`, {
          territories: player.territories.map(t => ({ name: t.name, troops: t.troops }))
        });
        window.gameUtils.showError('Negative troop total detected. Redirecting to risque.');
        setTimeout(() => window.location.href = 'risque.html', 2000);
        return total;
      }
      if (player.troopsTotal !== total) {
        logToStorage(`Corrected ${player.name}.troopsTotal: ${player.troopsTotal} -> ${total}`, {
          territories: player.territories.map(t => ({ name: t.name, troops: t.troops }))
        });
        player.troopsTotal = total;
      }
      window.gameUtils.renderStats(window.gameState);
      return total;
    }
    function checkPlayerElimination(defender) {
      updatePlayerTroopsTotal(defender);
      if (defender.territories.length === 0 && defender.troopsTotal <= 0) {
        const currentPlayer = window.gameState.players.find(p => p.name === window.gameState.currentPlayer);
        currentPlayer.cards = currentPlayer.cards || [];
        const transferredCards = defender.cards || [];
        window.gameState.transferredCardCount = transferredCards.length;
        currentPlayer.cards.push(...transferredCards);
        currentPlayer.cardCount = currentPlayer.cards.length;
        defender.cards = [];
        defender.cardCount = 0;
        window.gameState.cardEarnedViaAttack = true;
        window.gameState.defeatedPlayer = defender.name;
        window.gameState.turnOrder = window.gameState.turnOrder.filter(name => name !== defender.name);
        logToStorage(`Player ${defender.name} eliminated, ${transferredCards.length} cards transferred to ${currentPlayer.name}`, {
          transferredCards: transferredCards
        });
        saveGameState();
        return true;
      }
      return false;
    }
    function checkWinCondition() {
      if (window.gameState.players.find(p => p.territories.length === Object.keys(window.gameUtils.territories).length) || window.gameState.turnOrder.length === 1) {
        window.gameState.winner = window.gameState.currentPlayer;
        saveGameState();
        logToStorage('Win condition met, navigating to win.html');
        setTimeout(() => window.location.href = 'win.html', 1000);
      }
    }
    function renderAerialBridge() {
      const bridgeGroup = document.getElementById('aerial-bridge-group');
      if (!bridgeGroup) {
        logToStorage('Aerial bridge group not found');
        return;
      }
      bridgeGroup.innerHTML = '';
      if (aerialBridge && aerialBridge.source && aerialBridge.target) {
        const sourceTerritory = window.gameUtils.territories[aerialBridge.source];
        const targetTerritory = window.gameUtils.territories[aerialBridge.target];
        if (sourceTerritory && targetTerritory) {
          const sourceCircle = document.querySelector(`.territory-circle[data-label="${aerialBridge.source}"]`);
          const targetCircle = document.querySelector(`.territory-circle[data-label="${aerialBridge.target}"]`);
          if (sourceCircle && targetCircle) {
            const sourceRect = sourceCircle.getBoundingClientRect();
            const targetRect = targetCircle.getBoundingClientRect();
            const svg = document.getElementById('ui-svg');
            const svgRect = svg.getBoundingClientRect();
            const x1 = (sourceRect.left + sourceRect.width / 2 - svgRect.left) * 1920 / svgRect.width;
            const y1 = (sourceRect.top + sourceRect.height / 2 - svgRect.top) * 1080 / svgRect.height;
            const x2 = (targetRect.left + targetRect.width / 2 - svgRect.left) * 1920 / svgRect.width;
            const y2 = (targetRect.top + targetRect.height / 2 - svgRect.top) * 1080 / svgRect.height;
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', x1);
            line.setAttribute('y1', y1);
            line.setAttribute('x2', x2);
            line.setAttribute('y2', y2);
            line.setAttribute('class', 'aerial-bridge');
            bridgeGroup.appendChild(line);
            logToStorage('Rendered aerial bridge', { source: aerialBridge.source, target: aerialBridge.target });
          }
        }
      }
    }
    function showPrompt(message, buttons = [], selectOptions = null, report = '') {
      const existingPrompt = document.getElementById('prompt');
      if (existingPrompt) existingPrompt.remove();
      const prompt = document.createElement('div');
      prompt.id = 'prompt';
      prompt.className = 'prompt';
      prompt.innerHTML = `<div class="prompt-text">${message}</div>`;
      if (report) {
        const reportDiv = document.createElement('div');
        reportDiv.className = 'prompt-report';
        reportDiv.textContent = report;
        prompt.appendChild(reportDiv);
      }
      if (selectOptions) {
        if (selectOptions.attacker) {
          const attackerLabel = document.createElement('label');
          attackerLabel.textContent = 'Attacker Dice: ';
          const attackerSelect = document.createElement('select');
          attackerSelect.className = 'prompt-select';
          attackerSelect.id = 'attacker-dice-select';
          selectOptions.attacker.forEach(opt => {
            const option = document.createElement('option');
            option.value = opt.value;
            option.textContent = opt.label;
            attackerSelect.appendChild(option);
          });
          attackerSelect.value = selectOptions.attacker[selectOptions.attacker.length - 1].value;
          attackerSelect.addEventListener('change', () => {
            attackerDice = parseInt(attackerSelect.value);
            logToStorage(`Selected ${attackerDice} attacker dice`);
            for (let i = 0; i < 3; i++) {
              const rect = document.getElementById(`attacker-dice-${i}`);
              const text = document.getElementById(`attacker-dice-text-${i}`);
              if (rect && text) {
                if (i < attackerDice) {
                  rect.classList.add('active-attacker');
                  text.textContent = '1';
                } else {
                  rect.classList.remove('active-attacker');
                  text.textContent = '';
                }
              }
            }
          });
          prompt.appendChild(attackerLabel);
          prompt.appendChild(attackerSelect);
          const promptText = document.createElement('div');
          promptText.textContent = 'You can reduce the number of dice if you want.';
          promptText.style.fontSize = '16px';
          promptText.style.fontWeight = 'bold';
          promptText.style.marginTop = '5px';
          attackerSelect.parentElement.appendChild(promptText);
        }
        if (selectOptions.troops) {
          const troopsLabel = document.createElement('label');
          troopsLabel.textContent = `Additional Troops (0 to ${selectOptions.troops.max}): `;
          const troopsInput = document.createElement('input');
          troopsInput.type = 'number';
          troopsInput.className = 'prompt-input';
          troopsInput.id = 'troops-input';
          troopsInput.value = selectOptions.troops.initial;
          troopsInput.min = selectOptions.troops.min;
          troopsInput.max = selectOptions.troops.max;
          troopsInput.addEventListener('input', () => {
            const player = window.gameState.players.find(p => p.name === (attacker?.owner || window.gameState.currentPlayer));
            const attackerTerritory = player.territories.find(t => t.name === (attacker?.label || window.gameState.attackingTerritory?.name));
            const acquiredTerritoryPlayer = player.territories.find(t => t.name === (acquiredTerritory?.name || window.gameState.acquiredTerritory?.name));
            if (!attackerTerritory || !acquiredTerritoryPlayer) {
              logToStorage('Territories not found during troop transfer input', {
                attackerTerritory: attacker?.label || window.gameState.attackingTerritory?.name,
                acquiredTerritory: acquiredTerritory?.name || window.gameState.acquiredTerritory?.name
              });
              window.gameUtils.showError('Territory data missing. Redirecting to risque.');
              setTimeout(() => window.location.href = 'risque.html', 2000);
              return;
            }
            let value = parseInt(troopsInput.value) || selectOptions.troops.min;
            if (value < selectOptions.troops.min) value = selectOptions.troops.min;
            if (value > selectOptions.troops.max || attackerInitialTroops - minTroopsToTransfer - value < 1) {
              value = Math.min(selectOptions.troops.max, attackerInitialTroops - minTroopsToTransfer - 1);
              troopsInput.value = value;
              window.gameUtils.showError(`Cannot transfer ${troopsInput.value} troops. Must leave at least 1 troop in ${attackerTerritory.name.replace(/_/g, ' ').toUpperCase()}. Max: ${attackerInitialTroops - minTroopsToTransfer - 1}`);
              logToStorage('Invalid troop transfer input', {
                troops: parseInt(troopsInput.value),
                min: selectOptions.troops.min,
                max: selectOptions.troops.max,
                attackerTroops: attackerInitialTroops
              });
              const confirmButton = prompt.querySelector('.prompt-button');
              if (confirmButton) confirmButton.disabled = true;
              return;
            }
            troopsToTransfer = value;
            attackerTerritory.troops = attackerInitialTroops - minTroopsToTransfer - value;
            acquiredTerritoryPlayer.troops = minTroopsToTransfer + value;
            if (attacker) attacker.troops = attackerTerritory.troops;
            if (acquiredTerritory) acquiredTerritory.troops = acquiredTerritoryPlayer.troops;
            updatePlayerTroopsTotal(player);
            const confirmButton = prompt.querySelector('.prompt-button');
            if (confirmButton) confirmButton.disabled = false;
            logToStorage(`Troop transfer (input): ${attackerTerritory.name} -> ${attackerTerritory.troops}, ${acquiredTerritoryPlayer.name} -> ${acquiredTerritoryPlayer.troops}`, { additionalTroops: value });
            window.gameUtils.renderTerritories(null, window.gameState, true, [attackerTerritory.name, acquiredTerritoryPlayer.name]);
            window.gameUtils.renderStats(window.gameState);
          });
          troopsInput.addEventListener('wheel', (e) => {
            e.preventDefault();
            const currentValue = parseInt(troopsInput.value) || selectOptions.troops.min;
            const delta = e.deltaY < 0 ? 1 : -1;
            const newValue = Math.max(selectOptions.troops.min, Math.min(selectOptions.troops.max, currentValue + delta));
            troopsInput.value = newValue;
            const event = new Event('input');
            troopsInput.dispatchEvent(event);
          });
          prompt.appendChild(troopsLabel);
          prompt.appendChild(troopsInput);
          const event = new Event('input');
          troopsInput.dispatchEvent(event);
        }
        if (selectOptions.lossLimit) {
          const lossLabel = document.createElement('label');
          lossLabel.textContent = 'Loss Limit: ';
          const lossInput = document.createElement('input');
          lossInput.type = 'number';
          lossInput.className = 'prompt-input';
          lossInput.id = 'loss-limit-input';
          lossInput.value = selectOptions.lossLimit.initial;
          lossInput.min = selectOptions.lossLimit.min;
          prompt.appendChild(lossLabel);
          prompt.appendChild(lossInput);
        }
      }
      buttons.forEach(btn => {
        const button = document.createElement('button');
        button.className = 'prompt-button';
        button.textContent = btn.label;
        button.disabled = btn.disabled || false;
        button.onclick = btn.onClick;
        prompt.appendChild(button);
      });
      const uiOverlay = document.getElementById('ui-overlay');
      if (uiOverlay) {
        uiOverlay.appendChild(prompt);
        logToStorage(`Prompt displayed: ${message}`);
      } else {
        logToStorage('UI overlay not found for prompt');
        window.gameUtils.showError('UI overlay not found.');
      }
    }
    function rollDice(isBlitz = false) {
      if (!attacker || !defender) {
        showPrompt('Select territory to attack from.', [{ label: 'Cancel', onClick: cancelAttack }], null, 'Please select territories.');

          logToStorage(`Invalid defender: ${label} (own territory)`);
          return;
        }
        if (troops < 1) {
          showPrompt('Select territory to attack.', [{ label: 'Cancel', onClick: cancelAttack }], null, `${label.replace(/_/g, ' ')} has no troops to defend.`);
          logToStorage(`Invalid defender: ${label} (no troops)`);
          return;
        }
        const isAerialValid = aerialBridge && aerialBridge.source === attacker.label && aerialBridge.target === label;
        if (!isAerialValid && !adjacencies.includes(label)) {
          showPrompt('Select territory to attack.', [{ label: 'Cancel', onClick: cancelAttack }], null, `${label.replace(/_/g, ' ')} is not adjacent to ${attacker.label.replace(/_/g, ' ')}.`);
          logToStorage(`Invalid defender: ${label} (not adjacent)`);
          return;
        }
        defender = { label, owner, troops };
        logToStorage(`Selected defender: ${label}`);
        document.getElementById('prompt')?.remove();
        const svg = document.querySelector('.svg-overlay');
        svg.querySelectorAll('.territory-circle').forEach(circle => {
          circle.classList.toggle('selected', circle.getAttribute('data-label') === label || circle.getAttribute('data-label') === attacker.label);
        });
        window.gameUtils.renderTerritories(null, window.gameState, true);
        const maxAttackerDice = Math.min(attacker.troops - 1, 3);
        attackerDice = maxAttackerDice;
        logToStorage(`Set attackerDice: ${attackerDice}`);
        const defenderDice = Math.min(defender.troops, 2);
        for (let i = 0; i < 3; i++) {
          const rect = document.getElementById(`attacker-dice-${i}`);
          const text = document.getElementById(`attacker-dice-text-${i}`);
          if (rect && text) {
            if (i < maxAttackerDice) {
              rect.classList.add('active-attacker');
              text.textContent = '1';
            } else {
              rect.classList.remove('active-attacker');
              text.textContent = '';
            }
          }
        }
        for (let i = 0; i < 2; i++) {
          const rect = document.getElementById(`defender-dice-${i}`);
          const text = document.getElementById(`defender-dice-text-${i}`);
          if (rect && text) {
            if (i < defenderDice) {
              rect.classList.add('active-defender');
              text.textContent = '1';
            } else {
              rect.classList.remove('active-defender');
              text.textContent = '';
            }
          }
        }
        showPrompt('Refer to buttons below for attack choices.', [{
          label: 'Cancel',
          onClick: cancelAttack
        }], {
          attacker: Array.from({ length: maxAttackerDice }, (_, i) => ({ value: i + 1, label: `${i + 1} Dice` }))
        });
        logToStorage(`Auto-selected ${maxAttackerDice} attacker dice, ${defenderDice} defender dice`);
      }
    }
    document.addEventListener('DOMContentLoaded', () => {
      const maxRetries = 20;
      let retryCount = 0;
      function tryInitAttack() {
        const canvasWrapper = document.getElementById('canvas');
        const errorElement = document.getElementById('error');
        const uiOverlay = document.getElementById('ui-overlay');
        if (!canvasWrapper || !errorElement || !uiOverlay) {
          if (retryCount < maxRetries) {
            retryCount++;
            logToStorage(`DOM elements missing, retrying (${retryCount}/${maxRetries})`, {
              canvasWrapper: !!canvasWrapper,
              errorElement: !!errorElement,
              uiOverlay: !!uiOverlay
            });
            setTimeout(tryInitAttack, 300);
            return;
          }
          console.error('[Attack] Missing DOM elements after max retries', { canvasWrapper: !!canvasWrapper, errorElement: !!errorElement, uiOverlay: !!uiOverlay });
          logToStorage('Missing canvas or error element after max retries. Redirecting to risque.');
          window.gameUtils.showError('Missing canvas or error element. Redirecting to risque.');
          setTimeout(() => window.location.href = 'risque.html', 1000);
          return;
        }
        window.gameUtils.loadGameState(gameState => {
          if (!gameState || !gameState.players || !Array.isArray(gameState.players) || !gameState.currentPlayer) {
            logToStorage('Invalid game state: missing core properties', { gameState });
            window.gameUtils.showError('Invalid game state. Redirecting to risque.');
            setTimeout(() => window.location.href = 'risque.html', 1000);
            return;
          }
          window.gameState = gameState;
          if (window.gameState.round === 1) {
            window.gameState.players.forEach(player => {
              const maxCards = player.territories.length === 0 ? 7 : 1;
              if (player.cardCount > maxCards) {
                logToStorage('Corrected invalid card count', { player: player.name, oldCount: player.cardCount, newCount: maxCards });
                player.cardCount = maxCards;
                player.cards = player.cards.slice(0, maxCards);
              }
              updatePlayerTroopsTotal(player);
            });
          }
          if (window.gameState.conqueredThisTurn === undefined) {
            window.gameState.conqueredThisTurn = false;
            logToStorage('conqueredThisTurn undefined, defaulting to false');
          }
          const currentPlayer = gameState.players.find(p => p.name === gameState.currentPlayer);
          if (!currentPlayer || !currentPlayer.territories.length) {
            logToStorage('Current player not found or has no territories');
            window.gameUtils.showError('Invalid player state. Redirecting to risque.');
            setTimeout(() => window.location.href = 'risque.html', 1000);
            return;
          }
          updatePlayerTroopsTotal(currentPlayer);
          isAerialAttackEnabled = !!gameState.aerialAttack;
          aerialBridge = gameState.aerialAttack && gameState.aerialAttack.source && gameState.aerialAttack.target ? { ...gameState.aerialAttack } : null;
          logToStorage(`Aerial attack state: enabled=${isAerialAttackEnabled}, bridge=${JSON.stringify(aerialBridge)}`);
          const playerColor = window.gameUtils.colorMap[currentPlayer.color] || '#ffffff';
          const playerNameDiv = document.getElementById('attack-player-name');
          if (playerNameDiv) {
            playerNameDiv.textContent = `${gameState.currentPlayer} Attacks`;
            playerNameDiv.style.color = playerColor;
          }
          document.getElementById('aerial-attack').disabled = isAerialAttackEnabled && aerialBridge ? true : !isAerialAttackEnabled;
          document.getElementById('aerial-attack-group').style.display = 'block';
          const activePlayers = gameState.players.filter(p => p.territories.length > 0).length;
          const showConcedeButton = activePlayers === 2;
          document.getElementById('concede-button-group').style.display = showConcedeButton ? 'block' : 'none';
          const buttons = [
            { id: 'roll', label: 'roll dice', action: () => {
              const result = rollDice();
              if (!result.attackerLosses && !result.defenderLosses) return;
            }},
            { id: 'blitz', label: 'blitz', action: () => {
              if (!attacker || !defender) {
                showPrompt('Select territory to attack from.', [{ label: 'Cancel', onClick: cancelAttack }], null, 'Please select territories.');
                return;
              }
              const player = window.gameState.players.find(p => p.name === attacker.owner);
              const opponent = window.gameState.players.find(p => p.name === defender.owner);
              const attackerTerritory = player.territories.find(t => t.name === attacker.label);
              const defenderTerritory = opponent.territories.find(t => t.name === defender.label);
              if (!attackerTerritory || !defenderTerritory) {
                showPrompt('Select territory to attack from.', [{ label: 'Cancel', onClick: cancelAttack }], null, 'Invalid territory data.');
                logToStorage('Invalid territory data', { attackerTerritory, defenderTerritory });
                cancelAttack();
                return;
              }
              if (attackerTerritory.troops < 2) {
                showPrompt('Select territory to attack from.', [{ label: 'Cancel', onClick: cancelAttack }], null, 'Attacking territory must have at least 2 troops.');
                logToStorage(`Invalid attack: ${attacker.label} has ${attackerTerritory.troops} troops`);
                cancelAttack();
                return;
              }
              let totalAttackerLosses = 0, totalDefenderLosses = 0;
              while (attackerTerritory.troops > 1 && defenderTerritory.troops > 0 && !isAcquiring) {
                const maxAttackerDice = Math.min(attackerTerritory.troops - 1, 3);
                attackerDice = maxAttackerDice;
                const defenderDice = Math.min(defenderTerritory.troops, 2);
                const attackerRolls = Array.from({ length: attackerDice }, () => Math.floor(Math.random() * 6) + 1).sort((a, b) => b - a);
                const defenderRolls = Array.from({ length: defenderDice }, () => Math.floor(Math.random() * 6) + 1).sort((a, b) => b - a);
                let attackerLosses = 0, defenderLosses = 0;
                for (let i = 0; i < Math.min(attackerRolls.length, defenderRolls.length); i++) {
                  if (attackerRolls[i] > defenderRolls[i]) {
                    defenderLosses++;
                  } else {
                    attackerLosses++;
                  }
                }
                attackerLosses = Math.min(attackerLosses, attackerTerritory.troops - 1);
                defenderLosses = Math.min(defenderLosses, defenderTerritory.troops);
                totalAttackerLosses += attackerLosses;
                totalDefenderLosses += defenderLosses;
                attackerTerritory.troops -= attackerLosses;
                defenderTerritory.troops -= defenderLosses;
                attacker.troops = attackerTerritory.troops;
                defender.troops = defenderTerritory.troops;
                if (defenderTerritory.troops <= 0) {
                  isAcquiring = true;
                  minTroopsToTransfer = Math.min(attackerDice, 3);
                  maxTroopsToTransfer = Math.max(0, attackerTerritory.troops - 1);
                  attackerInitialTroops = attackerTerritory.troops + minTroopsToTransfer;
                  acquiredTerritory = { name: defender.label, troops: minTroopsToTransfer };
                  attackerTerritory.troops -= minTroopsToTransfer;
                  attacker.troops = attackerTerritory.troops;
                  opponent.territories = opponent.territories.filter(t => t.name !== defender.label);
                  player.territories.push({ name: defender.label, troops: minTroopsToTransfer });
                  window.gameState.cardEarnedViaAttack = true;
                  window.gameState.conqueredThisTurn = true;
                  window.gameState.attackingTerritory = { name: attacker.label, troops: attackerTerritory.troops };
                  window.gameState.acquiredTerritory = { name: defender.label, troops: minTroopsToTransfer };
                  window.gameState.minTroopsToTransfer = minTroopsToTransfer;
                  window.gameState.attackPhase = 'pending_transfer';
                  logToStorage(`${attacker.label} conquered ${defender.label}`, {
                    attackerTroops: attacker.troops,
                    acquiredTroops: acquiredTerritory.troops,
                    minTroopsToTransfer,
                    playerTroopsTotal: player.troopsTotal,
                    opponentTroopsTotal: opponent.troopsTotal
                  });
                }
              }
              updatePlayerTroopsTotal(player);
              updatePlayerTroopsTotal(opponent);
              ['attacker-dice-0', 'attacker-dice-1', 'attacker-dice-2'].forEach((id, i) => {
                const rect = document.getElementById(id);
                const text = document.getElementById(`attacker-dice-text-${i}`);
                if (rect && text) {
                  if (i < attackerDice) {
                    rect.classList.add('dice-rolling');
                    text.classList.add('dice-text-hidden');
                    text.textContent = '';
                  } else {
                    rect.classList.remove('dice-rolling');
                    text.classList.remove('dice-text-hidden', 'dice-text-visible');
                    text.textContent = '';
                  }
                }
              });
              ['defender-dice-0', 'defender-dice-1'].forEach((id, i) => {
                const rect = document.getElementById(id);
                const text = document.getElementById(`defender-dice-text-${i}`);
                if (rect && text) {
                  if (i < Math.min(defenderTerritory.troops, 2)) {
                    rect.classList.add('dice-rolling');
                    text.classList.add('dice-text-hidden');
                    text.textContent = '';
                  } else {
                    rect.classList.remove('dice-rolling');
                    text.classList.remove('dice-text-hidden', 'dice-text-visible');
                    text.textContent = '';
                  }
                }
              });
              setTimeout(() => {
                ['attacker-dice-0', 'attacker-dice-1', 'attacker-dice-2'].forEach((id, i) => {
                  const rect = document.getElementById(id);
                  const text = document.getElementById(`attacker-dice-text-${i}`);
                  if (rect && text && i < attackerDice) {
                    rect.classList.remove('dice-rolling');
                    text.classList.remove('dice-text-hidden');
                    text.classList.add('dice-text-visible');
                    text.textContent = '1';
                  }
                });
                ['defender-dice-0', 'defender-dice-1'].forEach((id, i) => {
                  const rect = document.getElementById(id);
                  const text = document.getElementById(`defender-dice-text-${i}`);
                  if (rect && text && i < Math.min(defenderTerritory.troops, 2)) {
                    rect.classList.remove('dice-rolling');
                    text.classList.remove('dice-text-hidden');
                    text.classList.add('dice-text-visible');
                    text.textContent = '1';
                  }
                });
                const resultMsg = totalAttackerLosses > 0 && totalDefenderLosses > 0 ? `${attacker.owner.toUpperCase()} loses ${totalAttackerLosses}\n${defender.owner.toUpperCase()} loses ${totalDefenderLosses}` :
                                  totalAttackerLosses > 0 ? `${attacker.owner.toUpperCase()} loses ${totalAttackerLosses}` :
                                  totalDefenderLosses > 0 ? `${defender.owner.toUpperCase()} loses ${totalDefenderLosses}` : '';
                logToStorage(`Blitz finished: ${resultMsg}`);
                if (isAcquiring) {
                  updatePlayerTroopsTotal(player);
                  updatePlayerTroopsTotal(opponent);
                  window.gameUtils.renderTerritories(null, window.gameState, true);
                  window.gameUtils.renderStats(window.gameState);
                  initTroopTransfer();
                  if (checkPlayerElimination(opponent)) {
                    setTimeout(() => window.location.href = 'conquer.html', 1000);
                    return;
                  }
                  checkWinCondition();
                } else {
                  showPrompt('Refer to buttons below for attack choices.', [], null, resultMsg);
                  cancelAttack();
                }
              }, 500);
            }},
            { id: 'conditional-blitz', label: 'conditional blitz', action: () => {
              if (!attacker || !defender) {
                showPrompt('Select territory to attack from.', [{ label: 'Cancel', onClick: cancelAttack }], null, 'Please select territories.');
                return;
              }
              showPrompt('Enter loss limit for Conditional Blitz:', [{
                label: 'Confirm',
                onClick: () => {
                  const lossInput = document.getElementById('loss-limit-input');
                  const lossLimit = parseInt(lossInput.value);
                  if (isNaN(lossLimit) || lossLimit <= 0) {
                    showPrompt('Enter loss limit for Conditional Blitz:', [
                      { label: 'Confirm', onClick: () => {} },
                      { label: 'Cancel', onClick: cancelAttack }
                    ], { lossLimit: { initial: 1, min: 1 } }, 'Please enter a valid loss limit.');
                    return;
                  }
                  document.getElementById('prompt')?.remove();
                  let totalLosses = 0;
                  const conditionalBlitzInterval = setInterval(() => {
                    if (!attacker || !defender || attacker.troops <= 1 || defender.troops <= 0 || totalLosses >= lossLimit || isAcquiring) {
                      clearInterval(conditionalBlitzInterval);
                      const resultMsg = totalLosses >= lossLimit ? `Conditional Blitz paused: reached loss limit of ${lossLimit}` : `Conditional Blitz finished`;
                      logToStorage(`Conditional Blitz result: ${resultMsg}`);
                      showPrompt('Refer to buttons below for attack choices.', [], null, resultMsg);
                      cancelAttack();
                      return;
                    }
                    totalLosses += rollDice().attackerLosses;
                  }, 1000);
                }
              }, { label: 'Cancel', onClick: cancelAttack }], { lossLimit: { initial: 1, min: 1 } });
            }},
            { id: 'pausable-blitz', label: 'pausable blitz', action: () => {
              if (!attacker || !defender) {
                showPrompt('Select territory to attack from.', [{ label: 'Cancel', onClick: cancelAttack }], null, 'Please select territories.');
                return;
              }
              if (isPausibleBlitzActive && isPausibleBlitzPaused) {
                isPausibleBlitzPaused = false;
                const pausableBlitzText = document.getElementById('pausable-blitz-text');
                if (pausableBlitzText) pausableBlitzText.textContent = 'Pause';
                logToStorage('Pausible Blitz resumed');
                pausableBlitzInterval = setInterval(() => {
                  if (!attacker || !defender || attacker.troops <= 1 || defender.troops <= 0 || isAcquiring) {
                    clearInterval(pausableBlitzInterval);
                    isPausibleBlitzActive = false;
                    isPausibleBlitzPaused = false;
                    if (pausableBlitzText) pausableBlitzText.textContent = 'Pausible Blitz';
                    if (!isAcquiring) {
                      const resultMsg = `Pausible Blitz finished`;
                      logToStorage(`Pausible Blitz finished: ${resultMsg}`);
                      showPrompt('Refer to buttons below for attack choices.', [], null, resultMsg);
                    }
                  } else {
                    rollDice();
                  }
                }, 1000);
                return;
              }
              if (isPausibleBlitzActive) {
                clearInterval(pausableBlitzInterval);
                isPausibleBlitzPaused = true;
                const pausableBlitzText = document.getElementById('pausable-blitz-text');
                if (pausableBlitzText) pausableBlitzText.textContent = 'Pausible Blitz';
                logToStorage('Pausible Blitz paused');
                showPrompt('Pausible Blitz paused. Click Pausable Blitz to resume or Stop Attack to cancel.', [], null, '');
                return;
              }
              isPausibleBlitzActive = true;
              const pausableBlitzText = document.getElementById('pausable-blitz-text');
              if (pausableBlitzText) pausableBlitzText.textContent = 'Pause';
              logToStorage(`Pausible Blitz started: ${attacker.label} vs ${defender.label}`);
              pausableBlitzInterval = setInterval(() => {
                if (!attacker || !defender || attacker.troops <= 1 || defender.troops <= 0 || isAcquiring) {
                  clearInterval(pausableBlitzInterval);
                  isPausibleBlitzActive = false;
                  isPausibleBlitzPaused = false;
                  if (pausableBlitzText) pausableBlitzText.textContent = 'Pausible Blitz';
                  if (!isAcquiring) {
                    const resultMsg = `Pausible Blitz finished`;
                    logToStorage(`Pausible Blitz finished: ${resultMsg}`);
                    showPrompt('Refer to buttons below for attack choices.', [], null, resultMsg);
                  }
                } else {
                  rollDice();
                }
              }, 1000);
            }},
            { id: 'stop-attack', label: 'stop attack', action: cancelAttack },
            { id: 'new-attack', label: 'new attack', action: cancelAttack },
            { id: 'reinforce', label: 'reinforcement phase', action: () => {
              if (isAcquiring || (window.gameState.attackPhase === 'pending_transfer' && !transferCompleted)) {
                logToStorage('Complete the troop transfer first');
                showPrompt('Select territory to attack from.', [{ label: 'Cancel', onClick: cancelAttack }], null, 'Complete the troop transfer first.');
                return;
              }
              if (isPausibleBlitzActive) {
                clearInterval(pausableBlitzInterval);
                isPausibleBlitzActive = false;
                isPausibleBlitzPaused = false;
                const pausableBlitzText = document.getElementById('pausable-blitz-text');
                if (pausableBlitzText) pausableBlitzText.textContent = 'Pausible Blitz';
              }
              window.gameState.phase = 'reinforce';
              window.gameState.aerialAttack = null;
              window.gameState.attackPhase = 'attack';
              window.gameState.conqueredThisTurn = false;
              window.gameState.attackingTerritory = null;
              window.gameState.acquiredTerritory = null;
              window.gameState.minTroopsToTransfer = 0;
              aerialBridge = null;
              saveGameState();
              logToStorage('Transitioning to reinforce.html, aerial attack reset');
              setTimeout(() => window.location.href = 'reinforce.html', 1000);
            }},
            { id: 'aerial-attack', label: 'aerial attack', action: () => {
              if (!isAerialAttackEnabled) {
                window.gameUtils.showError('Aerial attack not enabled. Use a wildcard in cardplay phase.');
                showPrompt('Select territory to attack from.', [{ label: 'Cancel', onClick: cancelAttack }]);
                return;
              }
              if (aerialBridge) {
                window.gameUtils.showError('Aerial bridge already set for this attack phase.');
                showPrompt('Select territory to attack from.', [{ label: 'Cancel', onClick: cancelAttack }]);
                return;
              }
              showPrompt('Select source territory for aerial bridge.', [{ label: 'Cancel', onClick: cancelAttack }]);
              isSelectingAerialSource = true;
            }},
            { id: 'concede', label: 'concede', action: () => {
              showPrompt('Concede game?', [
                { label: 'Yes', onClick: () => {
                  const currentPlayer = window.gameState.players.find(p => p.name === window.gameState.currentPlayer);
                  if (!currentPlayer) {
                    window.gameUtils.showError('Current player not found');
                    return;
                  }
                  const territories = currentPlayer.territories.slice();
                  currentPlayer.territories = [];
                  currentPlayer.troopsTotal = 0;
                  currentPlayer.cards = [];
                  currentPlayer.cardCount = 0;
                  const remainingPlayers = window.gameState.players.filter(p => p.name !== currentPlayer.name && window.gameState.turnOrder.includes(p.name));
                  if (remainingPlayers.length > 0) {
                    territories.forEach(territory => {
                      const randomPlayer = remainingPlayers[Math.floor(Math.random() * remainingPlayers.length)];
                      randomPlayer.territories.push({ name: territory.name, troops: 1 });
                      updatePlayerTroopsTotal(randomPlayer);
                    });
                  }
                  window.gameState.turnOrder = window.gameState.turnOrder.filter(name => name !== currentPlayer.name);
                  saveGameState();
                  logToStorage(`Player ${currentPlayer.name} conceded`);
                  window.gameUtils.renderTerritories(null, window.gameState);
                  window.gameUtils.renderStats(window.gameState);
                  if (window.gameState.turnOrder.length > 1) {
                    window.gameState.currentPlayer = window.gameState.turnOrder[0];
                    saveGameState();
                    logToStorage(`Navigating to cardplay.html for ${window.gameState.currentPlayer}`);
                    setTimeout(() => window.location.href = 'cardplay.html', 1000);
                  }
                }},
                { label: 'No', onClick: () => {} }
              ]);
            }}
          ];
          buttons.forEach(({ id, label, action }) => {
            const button = document.getElementById(id);
            if (button) {
              button.addEventListener('click', () => {
                logToStorage(`${label} clicked`);
                action();
              });
              button.addEventListener('keydown', e => {
                if (e.key === 'Enter' || e.key === ' ') {
                  e.preventDefault();
                  logToStorage(`${label} keydown`);
                  action();
                }
              });
            }
          });
          try {
            window.gameUtils.initGameView();
            if (window.gameState.attackPhase === 'pending_transfer' && window.gameState.conqueredThisTurn && window.gameState.attackingTerritory && window.gameState.acquiredTerritory) {
              logToStorage('Resuming troop transfer', {
                attackingTerritory: window.gameState.attackingTerritory,
                acquiredTerritory: window.gameState.acquiredTerritory,
                minTroopsToTransfer: window.gameState.minTroopsToTransfer
              });
              const player = window.gameState.players.find(p => p.name === window.gameState.currentPlayer);
              const attackerTerritory = player?.territories.find(t => t.name === window.gameState.attackingTerritory.name);
              const acquiredTerritoryPlayer = player?.territories.find(t => t.name === window.gameState.acquiredTerritory.name);
              if (attackerTerritory && acquiredTerritoryPlayer) {
                attacker = { label: attackerTerritory.name, owner: player.name, troops: attackerTerritory.troops };
                acquiredTerritory = { name: acquiredTerritoryPlayer.name, troops: acquiredTerritoryPlayer.troops };
                attackerInitialTroops = attackerTerritory.troops + window.gameState.minTroopsToTransfer;
                minTroopsToTransfer = window.gameState.minTroopsToTransfer;
                maxTroopsToTransfer = Math.max(0, attackerTerritory.troops - 1);
                isAcquiring = true;
                troopsToTransfer = 0;
                logToStorage(`Resumed troop transfer: minTroops=${minTroopsToTransfer}, maxTroops=${maxTroopsToTransfer}`);
              }
              initTroopTransfer();
            } else {
              window.gameUtils.renderTerritories(null, window.gameState, true);
              window.gameUtils.renderStats(window.gameState);
              renderAerialBridge();
              showPrompt('Select territory to attack from.', [{ label: 'Cancel', onClick: cancelAttack }]);
            }
            requestAnimationFrame(() => {
              window.gameUtils.resizeCanvas();
            });
          } catch (e) {
            if (retryCount < maxRetries) {
              retryCount++;
              logToStorage(`Initialization error, retrying (${retryCount}/${maxRetries})`, { error: e.message });
              setTimeout(tryInitAttack, 300);
              return;
            }
            logToStorage('Initialization error after max retries', { error: e.message });
            window.gameUtils.showError('Failed to initialize game view: ' + e.message);
            setTimeout(() => window.location.href = 'risque.html', 1000);
          }
        });
      }
      setTimeout(tryInitAttack, 300);
    });
    window.addEventListener('resize', () => {
      requestAnimationFrame(() => {
        window.gameUtils.resizeCanvas();
        renderAerialBridge();
      });
    });
    document.addEventListener('wheel', e => {
      if (e.ctrlKey) e.preventDefault();
    }, { passive: false });
    document.addEventListener('keydown', e => {
      if (e.key === 'Equal' || e.key === 'Minus' || (e.ctrlKey && (e.key === '+' || e.key === '-'))) {
        e.preventDefault();
      }
    });
  </script>
