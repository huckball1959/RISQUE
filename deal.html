<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }
        </script><!DOCTYPE html>
<html lang="en">
<head>

  <style>

<body>
  <div class="canvas-wrapper" id="canvas">
    <img id="stage-image" src="./assets/images/stage.png" alt="Stage" class="stage-image">
    <svg class="svg-overlay" viewBox="0 0 1920 1080" role="region" aria-label="Territory map"></svg>

  <script src="core.js"></script>
  <script>
    try {
      let gameState = null;
      let isDealing = false;
      function logToConsole(message) {
        const timestamp = new Date().toLocaleString("en-US", { timeZone: "America/New_York" });
        const logEntry = `[${timestamp}] [Deal] ${message}`;
        console.log(logEntry);
        const logs = JSON.parse(localStorage.getItem("gameLogs") || "[]");
        logs.push(logEntry);
        localStorage.setItem("gameLogs", JSON.stringify(logs));
      }
      function validateGameState(gameState) {
        if (!gameState) {
          logToConsole("Error: gameState is null or undefined");
          return false;
        }
        const requiredFields = ["phase", "players", "turnOrder", "currentPlayer", "round", "aerialAttack", "aerialBridge", "conquered", "deck", "isInitialDeploy", "continents"];
        const isValid = requiredFields.every(field => gameState.hasOwnProperty(field)) &&
          gameState.phase === "deal" &&
          gameState.players.length >= 2 &&
          gameState.turnOrder.length === gameState.players.length &&
          gameState.currentPlayer !== null &&
          gameState.turnOrder.includes(gameState.currentPlayer) &&
          gameState.deck.length <= 44 &&
          Object.keys(gameState.continents).length === 6 &&
          ["south_america", "north_america", "africa", "europe", "asia", "australia"].every(c => gameState.continents[c]);
        logToConsole(`Game state valid: ${isValid}${isValid ? "" : ", errors: " + JSON.stringify({
          missingFields: requiredFields.filter(f => !gameState.hasOwnProperty(f)),
          playerCount: gameState.players ? gameState.players.length : 0,
          turnOrderMatch: gameState.turnOrder && gameState.players ? gameState.turnOrder.length === gameState.players.length : false,
          currentPlayerSet: gameState.currentPlayer !== null,
          deckLength: gameState.deck ? gameState.deck.length : 0,
          continentsCount: gameState.continents ? Object.keys(gameState.continents).length : 0
        })}`);
        return isValid;
      }
      function showError(message) {
        logToConsole(`Error: ${message}`);
        const errorDiv = document.getElementById("error");
        if (errorDiv) {
          errorDiv.textContent = message;
          errorDiv.style.visibility = "visible";
          setTimeout(() => { errorDiv.style.visibility = "hidden"; }, 3000);
        }
      }
      function resizeCanvas() {
        const canvas = document.getElementById("canvas");
        if (!canvas) {
          logToConsole("Canvas not found for scaling");
          return;
        }
        const windowHeight = window.innerHeight;
        const windowWidth = window.innerWidth;
        let scale = Math.min(windowWidth / 1920, windowHeight / 1080);
        scale = Math.max(0.5, Math.min(1.0, scale));
        if (isNaN(scale) || scale <= 0) {
          logToConsole("Invalid scale, defaulting to 1");
          scale = 1;
        }
        canvas.style.transform = `translateX(-50%) scale(${scale})`;
        canvas.classList.add("visible");
        logToConsole(`Canvas scaled: scale=${scale}, innerWidth=${windowWidth}, innerHeight=${windowHeight}`);
      }
      function renderTerritory(territory) {
        const svg = document.querySelector(".svg-overlay");
        if (!svg) {
          logToConsole("SVG overlay not found");
          showError("SVG overlay not found");
          return;
        }
        const coordinates = {
          "afghanistan": { x: 748.18703, y: 468.32483 },
          "alaska": { x: 64.842522, y: 265.11024 },
          "alberta": { x: 146.86418, y: 365.16731 },
          "argentina": { x: 216.67912, y: 865.5414 },
          "brazil": { x: 284.95276, y: 732.33664 },
          "central_america": { x: 170.62205, y: 576.33074 },
          "china": { x: 855.15353, y: 493.48229 },
          "congo": { x: 595.46457, y: 748.55315 },
          "east_africa": { x: 641.71065, y: 681.1122 },
          "eastern_australia": { x: 1031.498, y: 746.77561 },
          "eastern_united_states": { x: 235.21063, y: 484.45871 },
          "egypt": { x: 582.83267, y: 621.50789 },
          "great_britain": { x: 498.44884, y: 456.57284 },
          "greenland": { x: 439.11614, y: 186.99803 },
          "iceland": { x: 515.34449, y: 294.36614 },
          "india": { x: 784.82483, y: 575.37996 },
          "indonesia": { x: 919.56503, y: 651.08858 },
          "irkutsk": { x: 916.07483, y: 338.23819 },
          "japan": { x: 985.51178, y: 454.41733 },
          "kamchatka": { x: 1027.0748, y: 309.67323 },
          "madagascar": { x: 685.31104, y: 834.99803 },
          "middle_east": { x: 681.33664, y: 589.1575 },
          "mongolia": { x: 909.8268, y: 427.87798 },
          "new_guinea": { x: 1025.3918, y: 655.91931 },
          "north_africa": { x: 508.37009, y: 669.15949 },
          "northern_europe": { x: 565.99608, y: 468.75595 },
          "northwest_territory": { x: 152.10828, y: 280.28149 },
          "ontario": { x: 242.19095, y: 368.77561 },
          "peru": { x: 200.3622, y: 765.23618 },
          "quebec": { x: 335.49802, y: 392.32682 },
          "scandinavia": { x: 578.69884, y: 349.31694 },
          "siam": { x: 881.69294, y: 581.48035 },
          "siberia": { x: 843.189, y: 196.64172 },
          "south_africa": { x: 602.40358, y: 829.0689 },
          "southern_europe": { x: 595.3347, y: 536.85237 },
          "ukraine": { x: 659.55711, y: 373.06298 },
          "ural": { x: 770.04923, y: 331.71261 },
          "venezuela": { x: 201.64369, y: 644.07278 },
          "western_australia": { x: 939.25995, y: 751.57681 },
          "western_europe": { x: 512.22638, y: 537.55513 },
          "western_united_states": { x: 142.3996, y: 456.57874 },
          "yakutsk": { x: 954.67323, y: 213.27755 }
        };
        const coord = coordinates[territory];
        if (!coord) {
          logToConsole(`Invalid territory: ${territory}`);
          return;
        }
        const player = gameState.players.find(p => p.territories && p.territories.some(terr => terr.name === territory));
        if (!player) {
          logToConsole(`No player assigned for territory: ${territory}`);
          return;
        }
        const existingCircle = svg.querySelector(`circle[data-label="${territory}"]`);
        const existingNumber = svg.querySelector(`text[data-label="${territory}"]`);
        if (existingCircle) existingCircle.remove();
        if (existingNumber) existingNumber.remove();
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", coord.x);
        circle.setAttribute("cy", coord.y);
        circle.setAttribute("r", "0");
        circle.setAttribute("fill", player.color);
        circle.setAttribute("stroke", "#000000");
        circle.setAttribute("stroke-width", "2");
        circle.setAttribute("class", `territory-circle ${player.color}`);
        circle.setAttribute("data-label", territory);
        svg.appendChild(circle);
        setTimeout(() => {
          circle.setAttribute("r", "30");
        }, 10);
        const number = document.createElementNS("http://www.w3.org/2000/svg", "text");
        number.setAttribute("x", coord.x);
        number.setAttribute("y", coord.y);
        number.setAttribute("fill", (player.color === "yellow" || player.color === "pink") ? "#000000" : "#ffffff");
        number.setAttribute("class", "territory-number");
        number.setAttribute("text-anchor", "middle");
        number.setAttribute("dominant-baseline", "middle");
        number.setAttribute("font-size", "24");
        number.setAttribute("data-label", territory);
        number.textContent = (player.territories.find(terr => terr.name === territory).troops || 0).toString().padStart(3, "0");
        svg.appendChild(number);
        logToConsole(`Assigned ${territory} to ${player.name} with ${number.textContent} troops`);
      }
      function dealInit() {
        if (isDealing) {
          logToConsole("Deal already in progress, skipping");
          return;
        }
        isDealing = true;
        logToConsole(`Initialized for ${gameState.currentPlayer || "no current player"}`);
        const dealText = document.getElementById("deal-text");
        if (!dealText) {
          logToConsole("Deal text not found");
          showError("Deal text not found");
          isDealing = false;
          return;
        }
        if (!validateGameState(gameState)) {
          showError("Invalid game state");
          isDealing = false;
          return;
        }
        let territories = [
          "afghanistan", "alaska", "alberta", "argentina", "brazil", "central_america", "china", "congo",
          "east_africa", "eastern_australia", "eastern_united_states", "egypt", "great_britain", "greenland",
          "iceland", "india", "indonesia", "irkutsk", "japan", "kamchatka", "madagascar", "middle_east",
          "mongolia", "new_guinea", "north_africa", "northern_europe", "northwest_territory", "ontario",
          "peru", "quebec", "scandinavia", "siam", "siberia", "south_africa", "southern_europe", "ukraine",
          "ural", "venezuela", "western_australia", "western_europe", "western_united_states", "yakutsk"
        ];
        let players = gameState.players;
        let currentPlayerIndex = players.findIndex(p => p.name === gameState.currentPlayer);
        logToConsole(`Current player index: ${currentPlayerIndex}, currentPlayer: ${gameState.currentPlayer}`);
        if (currentPlayerIndex === -1) {
          logToConsole(`Error: Invalid currentPlayer ${gameState.currentPlayer}, halting`);
          showError(`Invalid currentPlayer: ${gameState.currentPlayer}`);
          isDealing = false;
          return;
        }
        let dealtCount = 0;
        let playerTerritoryCounts = players.map(() => 0);
        const assignTerritory = () => {
          if (territories.length === 0) {
            logToConsole(`Dealt ${dealtCount} territories among ${players.length} players, starting with ${gameState.currentPlayer}`);
            gameState.deck = gameState.deck.filter(t => !gameState.players.some(p => p.territories.some(terr => terr.name === t)));
            gameState.currentPlayer = gameState.turnOrder[0];
            gameState.phase = "deal";
            gameState.selectionPhase = "deployOrder";
            localStorage.setItem("gameState", JSON.stringify(gameState));
            logToConsole("Game state updated, selectionPhase: deployOrder");
            dealText.classList.add("fade-out");
            setTimeout(() => {
              logToConsole("Redirecting to player1.html");
              window.location.href = "player1.html";
            }, 3000);
            isDealing = false;
            return;
          }
          let territoryIndex = Math.floor(Math.random() * territories.length);
          let territory = territories[territoryIndex];
          let player = players[currentPlayerIndex];
          if (!player.territories) {
            player.territories = [];
          }
          player.territories.push({ name: territory, troops: 1 });
          player.troopsTotal = (player.troopsTotal || 0) + 1;
          player.bankValue = (player.bankValue || 0) - 1;
          playerTerritoryCounts[currentPlayerIndex]++;
          territories.splice(territoryIndex, 1);
          dealtCount++;
          currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
          localStorage.setItem("gameState", JSON.stringify(gameState));
          renderTerritory(territory);
          setTimeout(assignTerritory, 500);
        };
        setTimeout(assignTerritory, 500);
      }
      function initializeStage() {
        const canvas = document.getElementById("canvas");
        if (!canvas) {
          logToConsole("Canvas not found");
          showError("Canvas not found");
          return;
        }
        const stageImage = document.getElementById("stage-image");
        if (!stageImage) {
          logToConsole("Stage image not found");
          showError("Stage image not found");
          return;
        }
        const svg = document.querySelector(".svg-overlay");
        if (!svg) {
          logToConsole("SVG overlay not found");
          showError("SVG overlay not found");
          return;
        }
        const dealText = document.getElementById("deal-text");
        if (!dealText) {
          logToConsole("Deal text not found");
          showError("Deal text not found");
          return;
        }
        stageImage.onerror = () => {
          logToConsole("Failed to load stage image");
          showError("Failed to load stage image. Ensure ./assets/images/stage.png exists.");
        };
        const init = () => {
          logToConsole("Stage image loaded successfully");
          canvas.classList.add("visible");
          stageImage.classList.add("visible");
          dealText.classList.add("visible");
          resizeCanvas();
          dealInit();
        };
        stageImage.onload = init;
        if (stageImage.complete) {
          init();
        }
      }
      document.addEventListener("DOMContentLoaded", () => {
        gameState = JSON.parse(localStorage.getItem("gameState") || "{}");
        logToConsole("DOM loaded, initializing deal");
        requestAnimationFrame(() => {
          resizeCanvas();
          initializeStage();
        });
      });
      window.getGameLogs = function() {
        return JSON.parse(localStorage.getItem("gameLogs") || "[]").join("\n");
      };
      window.addEventListener("resize", resizeCanvas);
      window.addEventListener("fullscreenchange", () => {
        logToConsole(`Fullscreen mode: ${document.fullscreenElement ? "enabled" : "disabled"}`);
        resizeCanvas();
      });
      document.addEventListener("wheel", e => {
        if (e.ctrlKey) e.preventDefault();
      }, { passive: false });
      document.addEventListener("keydown", e => {
        if (e.key === "Equal" || e.key === "Minus" || (e.ctrlKey && (e.key === "+" || e.key === "-"))) {
          e.preventDefault();
        }
        if (e.key === "F11") {
          resizeCanvas();
        }
      });
    } catch (e) {
      console.error("Script error in deal.html:", e);
      logToConsole(`Script error: ${e.message}`);
    }
  </script>
