<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }

  <script>
    try {
      function logToConsole(message, data) {
        const timestamp = new Date().toLocaleString("en-US", { timeZone: "America/New_York" });
        const logEntry = `[${timestamp}] [Login] ${message}`;
        console.log(logEntry, data || '');
        const logs = JSON.parse(localStorage.getItem("gameLogs") || "[]");
        logs.push(logEntry);
        if (data) logs.push(JSON.stringify(data, null, 2));
        localStorage.setItem("gameLogs", JSON.stringify(logs));
      }
      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }
      function validateGameState(gameState) {
        const isValid = gameState &&
          gameState.players &&
          gameState.players.length >= 2 &&
          gameState.players.every(p => p.name && p.color && Array.isArray(p.territories));
        logToConsole(`Game state valid: ${isValid}${isValid ? "" : ", errors: Invalid or missing player data"}`);
        return isValid;
      }
      function initializeGameState() {
        localStorage.removeItem("gameState");
        let gameState = {
          phase: "deal",
          selectionPhase: "firstCard",
          players: [],
          turnOrder: [],
          currentPlayer: null,
          round: 1,
          aerialAttack: false,
          aerialBridge: null,
          conquered: false,
          deck: shuffleArray([
            "afghanistan", "alaska", "alberta", "argentina", "brazil", "central_america",
            "china", "congo", "east_africa", "eastern_australia", "eastern_united_states",
            "egypt", "great_britain", "greenland", "iceland", "india", "indonesia",
            "irkutsk", "japan", "kamchatka", "madagascar", "middle_east", "mongolia",
            "new_guinea", "north_africa", "northern_europe", "northwest_territory",
            "ontario", "peru", "quebec", "scandinavia", "siam", "siberia",
            "south_africa", "southern_europe", "ukraine", "ural", "venezuela",
            "western_australia", "western_europe", "western_united_states", "yakutsk",
            "wildcard1", "wildcard2"
          ]),
          isInitialDeploy: true,
          continents: {
            south_america: { bonus: 2 },
            north_america: { bonus: 5 },
            africa: { bonus: 3 },
            europe: { bonus: 5 },
            asia: { bonus: 7 },
            australia: { bonus: 2 }
          },
          continentCollectionCounts: {
            south_america: 0,
            north_america: 0,
            africa: 0,
            europe: 0,
            asia: 0,
            australia: 0
          },
          cardplayConquered: false,
          cardEarnedViaAttack: false,
          cardEarnedViaCardplay: false,
          cardAwardedThisTurn: false,
          lastCardDrawn: null
        };
        localStorage.setItem("gameState", JSON.stringify(gameState));
        logToConsole("Game state initialized with shuffled deck", { firstFiveCards: gameState.deck.slice(0, 5) });
      }
      function resizeCanvas() {
        const canvas = document.getElementById("canvas");
        if (!canvas) {
          logToConsole("Canvas not found for scaling");
          return;
        }
        const scale = Math.min(window.innerHeight / 1080, window.innerWidth / 1920);
        canvas.style.transform = `translate(-50%, 0) scale(${scale})`;
        canvas.classList.add("visible");
        logToConsole(`Canvas scaled: scale=${scale}, innerWidth=${window.innerWidth}, innerHeight=${window.innerHeight}`);
      }
      function getTargetRow() {
        const rows = document.querySelectorAll(".player-row");
        for (const row of rows) {
          const input = row.querySelector("input");
          const colorField = row.querySelector(".color-field");
          if (input.value.trim() !== "" && colorField.dataset.color === "") {
            return row;
          }
        }
        logToConsole("No valid row for color selection");
        return null;
      }
      document.addEventListener("DOMContentLoaded", () => {
        logToConsole("DOM loaded, initializing login");
        localStorage.setItem("gameLogs", JSON.stringify([]));
        const canvas = document.getElementById("canvas");
        const welcomeText = document.querySelector(".welcome-text");
        const loginContainer = document.querySelector(".login-container");
        const loginButton = document.getElementById("login-button");
        const loadButton = document.querySelector(".load-button");
        const loadInput = document.getElementById("load-game-input");
        if (!canvas || !welcomeText || !loginContainer || !loginButton || !loadButton || !loadInput) {
          logToConsole("Error: Missing critical DOM elements");
          return;
        }
        requestAnimationFrame(() => {
          resizeCanvas();
          setTimeout(resizeCanvas, 100);
          initializeGameState();
        });
        const inputs = document.querySelectorAll(".player-row input");
        const swatches = document.querySelectorAll(".color-swatch");
        inputs.forEach((input, index) => {
          input.addEventListener("input", () => {
            logToConsole(`Player ${index + 1} name entered: ${input.value.trim()}`);
          });
        });
        swatches.forEach(swatch => {
          swatch.addEventListener("click", () => {
            if (!swatch.classList.contains("active")) {
              logToConsole(`Color swatch ${swatch.dataset.color} clicked but not active`);
              return;
            }
            const color = swatch.dataset.color;
            const row = getTargetRow();
            if (!row) {
              logToConsole("No valid row for color selection");
              return;
            }
            const playerIndex = Array.from(document.querySelectorAll(".player-row")).indexOf(row) + 1;
            const colorField = row.querySelector(".color-field");
            colorField.style.background = getComputedStyle(swatch).backgroundColor;
            colorField.dataset.color = color;
            swatch.classList.remove("active");
            swatch.classList.add("unavailable");
            logToConsole(`Player ${playerIndex} selected color: ${color}`);
          });
        });
        document.querySelectorAll(".color-field").forEach(field => {
          field.addEventListener("click", () => {
            const color = field.dataset.color;
            if (!color) {
              logToConsole("Color field clicked but no color assigned");
              return;
            }
            const swatch = document.querySelector(`.color-swatch[data-color="${color}"]`);
            const row = field.closest(".player-row");
            const playerIndex = Array.from(document.querySelectorAll(".player-row")).indexOf(row) + 1;
            field.style.background = "transparent";
            field.dataset.color = "";
            if (swatch) {
              swatch.classList.remove("unavailable");
              swatch.classList.add("active");
            }
            logToConsole(`Player ${playerIndex} deselected color: ${color}`);
          });
        });
        loginButton.addEventListener("click", () => {
          logToConsole("LOG IN clicked");
          const rows = document.querySelectorAll(".player-row");
          const filledRows = Array.from(rows).filter(row => {
            const input = row.querySelector("input");
            const colorField = row.querySelector(".color-field");
            return input.value.trim() !== "" && colorField.dataset.color !== "";
          });
          if (filledRows.length < 2) {
            logToConsole("Login failed: At least two players required");
            return;
          }
          const names = filledRows.map(row => row.querySelector("input").value.trim());
          const colors = filledRows.map(row => row.querySelector(".color-field").dataset.color);
          if (new Set(names).size !== names.length) {
            logToConsole("Login failed: Duplicate names detected");
            return;
          }
          if (new Set(colors).size !== colors.length) {
            logToConsole("Login failed: Colors must be unique");
            return;
          }
          const gameState = {
            phase: "deal",
            selectionPhase: "firstCard",
            players: filledRows.map((row, index) => ({
              name: row.querySelector("input").value.trim(),

              bookValue: 0,
              continentValues: {},

              territories: [],
              troopsTotal: 0,
              confirmed: false
            })),
            turnOrder: filledRows.map(row => row.querySelector("input").value.trim()),
            currentPlayer: null,
            round: 1,
            aerialAttack: false,
            aerialBridge: null,
            conquered: false,
            deck: shuffleArray([
              "afghanistan", "alaska", "alberta", "argentina", "brazil", "central_america",
              "china", "congo", "east_africa", "eastern_australia", "eastern_united_states",
              "egypt", "great_britain", "greenland", "iceland", "india", "indonesia",
              "irkutsk", "japan", "kamchatka", "madagascar", "middle_east", "mongolia",
              "new_guinea", "north_africa", "northern_europe", "northwest_territory",
              "ontario", "peru", "quebec", "scandinavia", "siam", "siberia",
              "south_africa", "southern_europe", "ukraine", "ural", "venezuela",
              "western_australia", "western_europe", "western_united_states", "yakutsk",
              "wildcard1", "wildcard2"
            ]),
            isInitialDeploy: true,
            continents: {
              south_america: { bonus: 2 },
              north_america: { bonus: 5 },
              africa: { bonus: 3 },
              europe: { bonus: 5 },
              asia: { bonus: 7 },
              australia: { bonus: 2 }
            },
            continentCollectionCounts: {
              south_america: 0,
              north_america: 0,
              africa: 0,
              europe: 0,
              asia: 0,
              australia: 0
            },
            cardplayConquered: false,
            cardEarnedViaAttack: false,
            cardEarnedViaCardplay: false,
            cardAwardedThisTurn: false,
            lastCardDrawn: null
          };
          localStorage.setItem("gameState", JSON.stringify(gameState));
          logToConsole("Game state updated with shuffled deck", { firstFiveCards: gameState.deck.slice(0, 5) });
          welcomeText.classList.add("fade-out");
          loginButton.classList.add("fade-out");
          loadButton.classList.add("fade-out");
          loginContainer.classList.add("fade-out");
          setTimeout(() => {
            logToConsole("Redirecting to player1.html");
            window.location.href = "player1.html";
          }, 2000);
        });
        loadButton.addEventListener("click", () => {
          logToConsole("LOAD GAME clicked, triggering file input");
          loadInput.click();
        });
        loadInput.addEventListener("change", (event) => {
          const file = event.target.files[0];
          if (!file) {
            logToConsole("No file selected for loading");
            return;
          }
          logToConsole(`Loading game file: ${file.name}`);
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const gameState = JSON.parse(e.target.result);
              if (!validateGameState(gameState)) {
                logToConsole("Invalid game state in loaded file");
                return;
              }
              if (gameState.phase === "getcard" || gameState.phase === "receivecard") {
                const currentIndex = gameState.turnOrder.indexOf(gameState.currentPlayer);
                if (currentIndex === -1) {
                  logToConsole("Current player not in turn order");
                  return;
                }
                const nextIndex = (currentIndex + 1) % gameState.turnOrder.length;
                gameState.currentPlayer = gameState.turnOrder[nextIndex];
                if (nextIndex === 0) {
                  gameState.round = (gameState.round || 1) + 1;
                  logToConsole(`End of round ${gameState.round - 1}, advancing to ${gameState.currentPlayer}, round ${gameState.round}`);
                } else {
                  logToConsole(`Advancing to next player: ${gameState.currentPlayer}, round ${gameState.round}`);
                }
                gameState.phase = "cardplay";
              }
              localStorage.setItem("gameState", JSON.stringify(gameState));
              logToConsole("Game state loaded", { currentPlayer: gameState.currentPlayer, phase: gameState.phase, round: gameState.round });
              welcomeText.classList.add("fade-out");
              loginButton.classList.add("fade-out");
              loadButton.classList.add("fade-out");
              loginContainer.classList.add("fade-out");
              setTimeout(() => {
                logToConsole("Redirecting to cardplay.html");
                window.location.href = "cardplay.html";
              }, 2000);
            } catch (err) {
              logToConsole(`Error parsing game file: ${err.message}`);
            }
            loadInput.value = "";
          };
          reader.readAsText(file);
        });
      });
      window.addEventListener("resize", resizeCanvas);
      window.addEventListener("load", resizeCanvas);
      document.addEventListener("fullscreenchange", resizeCanvas);
      document.addEventListener("wheel", e => {
        if (e.ctrlKey) e.preventDefault();
      }, { passive: false });
      document.addEventListener("keydown", e => {
        if (e.key === "Equal" || e.key === "Minus" || (e.ctrlKey && (e.key === "+" || e.key === "-"))) {
          e.preventDefault();
        }
        if (e.key === "F11") {
          resizeCanvas();
        }
      });
    } catch (e) {
      console.error("Script error in risque.html:", e);
      logToConsole(`Script error: ${e.message}`);
    }
  </script>
