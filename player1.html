<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }
        </script><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>RISQUE - Player Selection</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: Arial, sans-serif;
    }
    .canvas-wrapper {
      width: 1920px;
      height: 1080px;
      position: absolute;
      top: 0;
      left: 50%;
      transform-origin: top center;
      transform: translate(-50%, 0);
      background: #6eb4bd;
      border: 6px solid #ff0000;
      will-change: transform;
      display: none;
    }
    .canvas-wrapper.visible {
      display: block;
    }
    .stage-image {
      position: absolute;
      width: 1920px;
      height: 1080px;
      top: 0;
      left: 0;
      z-index: 0;
      object-fit: contain;
      background: #333333;
      image-rendering: pixelated;
    }
    .svg-overlay {
      position: absolute;
      width: 1920px;
      height: 1080px;
      top: 0;
      left: 0;
      z-index: 1;
      pointer-events: none;
    }
    .ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 1920px;
      height: 1080px;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      transition: opacity 2s ease;
    }
    .ui-overlay.visible {
      opacity: 1;
    }
    .ui-overlay.fade-out {
      opacity: 0;
    }
    .title-text, .name-cycle, .result-text {
      position: absolute;
      top: 540px;
      left: 1500px;
      transform: translateX(-50%);
      font-size: 48px;
      font-weight: bold;
      text-align: center;
      max-width: 840px;
      white-space: nowrap;
      -webkit-text-stroke: 2px #000000;
      text-stroke: 2px #000000;
    }
    .title-text {
      top: 400px;
    }
    .result-text {
      display: none;
    }
  </style>
</head>
<body>
  <div class="canvas-wrapper" id="canvas">
    <img id="stage-image" src="assets/images/stage.png" alt="Stage" class="stage-image">
    <svg class="svg-overlay" viewBox="0 0 1920 1080" role="region" aria-label="Territory map"></svg>
    <div class="ui-overlay" id="ui-overlay">
      <div class="title-text" id="title-text"></div>
      <div class="name-cycle" id="name-cycle"></div>
      <div class="result-text" id="result-text"></div>
    </div>
  </div>
  <script>
    try {
      function logToConsole(message) {
        const timestamp = new Date().toLocaleString("en-US", { timeZone: "America/New_York" });
        const logEntry = `[${timestamp}] [Player1] ${message}`;
        console.log(logEntry);
        const logs = JSON.parse(localStorage.getItem("gameLogs") || "[]");
        logs.push(logEntry);
        localStorage.setItem("gameLogs", JSON.stringify(logs));
      }
      function validateGameState(gameState) {
        const isValid = gameState &&
          gameState.players &&
          gameState.players.length >= 2 &&
          gameState.turnOrder &&
          gameState.turnOrder.length === gameState.players.length &&
          gameState.players.every(p => p.name && p.color);
        logToConsole(`Game state valid: ${isValid}${isValid ? "" : ", errors: Invalid or missing player data"}`);
        return isValid;
      }
      function resizeCanvas() {
        const canvas = document.getElementById("canvas");
        if (!canvas) {
          logToConsole("Canvas not found for scaling");
          return;
        }
        const scale = Math.min(window.innerHeight / 1080, window.innerWidth / 1920);
        canvas.style.transform = `translate(-50%, 0) scale(${scale})`;
        canvas.classList.add("visible");
        logToConsole(`Canvas scaled: scale=${scale}, innerWidth=${window.innerWidth}, innerHeight=${window.innerHeight}`);
      }
      document.addEventListener("DOMContentLoaded", () => {
        logToConsole("DOM loaded, starting player1");
        const canvas = document.getElementById("canvas");
        const stageImage = document.getElementById("stage-image");
        const svgOverlay = document.querySelector(".svg-overlay");
        const uiOverlay = document.getElementById("ui-overlay");
        const titleText = document.getElementById("title-text");
        const nameCycle = document.getElementById("name-cycle");
        const resultText = document.getElementById("result-text");
        if (!canvas || !stageImage || !svgOverlay || !uiOverlay || !nameCycle || !resultText || !titleText) {
          logToConsole("Error: Missing critical DOM elements");
          return;
        }
        try {
          const rawGameState = localStorage.getItem('gameState');
          if (!rawGameState) {
            logToConsole("Error: No game state found in localStorage");
            window.location.href = "risque.html";
            return;
          }
          window.gameState = JSON.parse(rawGameState);
          if (!validateGameState(window.gameState)) {
            logToConsole("Invalid game state, redirecting to risque.html");
            window.location.href = "risque.html";
            return;
          }
        } catch (e) {
          logToConsole(`Error parsing game state: ${e.message}`);
          window.location.href = "risque.html";
          return;
        }
        const validPhases = ['firstCard', 'deployOrder', 'cardPlay'];
        const selectionPhase = window.gameState.selectionPhase || 
          (window.gameState.phase === 'login' ? 'firstCard' : 
           window.gameState.phase === 'deal' || window.gameState.phase === 'deploy1' ? 'deployOrder' : 'cardPlay');
        if (!validPhases.includes(selectionPhase)) {
          logToConsole(`Invalid selectionPhase: ${selectionPhase}, redirecting to risque.html`);
          window.location.href = "risque.html";
          return;
        }
        logToConsole(`Determined selectionPhase: ${selectionPhase}, gameState.phase: ${window.gameState.phase}`);
        const titleMap = {
          firstCard: 'Selecting Who Gets The First Card',
          deployOrder: 'Selecting Who Deploys First',
          cardPlay: 'Selecting Player 1'
        };
        titleText.textContent = titleMap[selectionPhase] || 'Player Selection';
        const loadCore = selectionPhase === 'deployOrder' || selectionPhase === 'cardPlay';
        if (loadCore) {
          const coreScript = document.createElement('script');
          coreScript.src = 'core.js';
          coreScript.onload = () => {
            window.gameUtils.initGameView();
            window.gameUtils.renderAll(window.gameState, null, {});
            logToConsole("Core.js loaded and rendered for " + selectionPhase);
          };
          coreScript.onerror = () => {
            logToConsole("Failed to load core.js");
          };
          document.head.appendChild(coreScript);
        }
        requestAnimationFrame(() => {
          resizeCanvas();
          setTimeout(resizeCanvas, 100);
          if (!loadCore) {
            stageImage.classList.add("visible");
            logToConsole("Stage image rendered for firstCard");
          }
          setTimeout(() => {
            uiOverlay.classList.add("visible");
            logToConsole("UI fade-in started");
            cycleNames(selectionPhase);
          }, 1000);
        });
        const players = window.gameState.players;
        const colors = {
          blue: "#0000ff",
          red: "#ff0000",
          green: "#008000",
          yellow: "#ffff00",
          black: "#333333",
          pink: "#ff69b4"
        };
        function cycleNames(selectionPhase) {
          let currentIndex = 0;
          let cycleCount = 0;
          const cycleDuration = 4000;
          const cyclesPerSecond = 10;
          const totalCycles = cycleDuration * cyclesPerSecond / 1000;
          function cycle() {
            nameCycle.textContent = players[currentIndex].name;
            nameCycle.style.color = colors[players[currentIndex].color];
            nameCycle.className = `name-cycle ${players[currentIndex].color}`;
            currentIndex = (currentIndex + 1) % players.length;
            cycleCount++;
            if (cycleCount < totalCycles) {
              setTimeout(cycle, 1000 / cyclesPerSecond);
            } else {
              const randomIndex = Math.floor(Math.random() * players.length);
              window.gameState.currentPlayer = players[randomIndex].name;
              window.gameState.turnOrder = [players[randomIndex].name].concat(
                players.filter(p => p.name !== players[randomIndex].name).map(p => p.name)
              );
              const redirectMap = {
                firstCard: { phase: 'deal', url: 'deal.html' },
                deployOrder: { phase: 'deploy', url: 'deploy1.html' },
                cardPlay: { phase: 'cardplay', url: 'cardplay.html' }
              };
              window.gameState.phase = redirectMap[selectionPhase].phase;
              window.gameState.selectionPhase = selectionPhase === 'firstCard' ? 'deployOrder' : 
                                               selectionPhase === 'deployOrder' ? 'cardPlay' : 'cardPlay';
              localStorage.setItem("gameState", JSON.stringify(window.gameState));
              logToConsole(`Random player selected: ${window.gameState.currentPlayer}, selectionPhase: ${selectionPhase}`);
              nameCycle.style.display = "none";
              resultText.textContent = `${window.gameState.currentPlayer} Selected`;
              resultText.style.color = colors[players[randomIndex].color];
              resultText.className = `result-text ${players[randomIndex].color}`;
              resultText.style.display = "block";
              logToConsole("Showing result text");
              setTimeout(() => {
                uiOverlay.classList.add("fade-out");
                logToConsole("UI fade-out started");
                setTimeout(() => {
                  logToConsole(`Redirecting to ${redirectMap[selectionPhase].url}`);
                  window.location.href = redirectMap[selectionPhase].url;
                }, 1000);
              }, 1000);
            }
          }
          logToConsole("Starting name cycle animation after 2-second UI delay");
          cycle();
        }
      });
      window.getGameLogs = function() {
        return JSON.parse(localStorage.getItem("gameLogs") || "[]").join("\n");
      };
      window.addEventListener("resize", resizeCanvas);
      window.addEventListener("fullscreenchange", () => {
        logToConsole(`Fullscreen mode: ${document.fullscreenElement ? "enabled" : "disabled"}`);
        resizeCanvas();
      });
      document.addEventListener("wheel", e => {
        if (e.ctrlKey) e.preventDefault();
      }, { passive: false });
      document.addEventListener("keydown", e => {
        if (e.key === "Equal" || e.key === "Minus" || (e.ctrlKey && (e.key === "+" || e.key === "-"))) {
          e.preventDefault();
        }
        if (e.key === "F11") {
          resizeCanvas();
        }
      });
    } catch (e) {
      console.error("Script error in player1.html:", e);
      logToConsole(`Script error: ${e.message}`);
    }
  </script>
</body>
</html>
